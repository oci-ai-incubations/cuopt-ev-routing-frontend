name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, review_requested]
  push:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Vite build check
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Vitest with coverage
        run: |
          npx vitest run --coverage \
            --coverage.provider=v8 \
            --coverage.lines=80 \
            --coverage.functions=80 \
            --coverage.branches=80 \
            --coverage.statements=80

  build-and-push:
    runs-on: ubuntu-latest
    needs: [security-scan, lint, test]
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      IMAGE_NAME: corrino-devops-repository/cuopt-ev-routing-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to OCIR
        uses: oracle-actions/login-ocir@v1.3.0
        with:
          auth_token: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }} .

      - name: Tag and push image
        run: |
          REGISTRY="iad.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}"
          docker tag ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }} \
            $REGISTRY/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          docker push $REGISTRY/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}

      - name: Tag and push latest
        if: github.event_name == 'push'
        run: |
          REGISTRY="iad.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}"
          docker tag ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }} \
            $REGISTRY/${{ env.IMAGE_NAME }}:latest
          docker push $REGISTRY/${{ env.IMAGE_NAME }}:latest
