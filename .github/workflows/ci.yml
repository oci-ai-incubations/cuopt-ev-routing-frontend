name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  # ── Frontend checks ──────────────────────────────────────────────
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript build check
        run: npm run build

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest with coverage
        run: npm run test:coverage

  # ── Backend checks ───────────────────────────────────────────────
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint (server)
        run: npx eslint server/

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend tests with coverage
        run: npm run test:backend:coverage

  # ── Security ─────────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  # ── Build & push image (PR) ─────────────────────────────────────
  build-and-push-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-frontend, lint-backend, test-backend, security-scan]
    env:
      IMAGE_REPO: iad.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/corrino-devops-repository
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to OCIR
        uses: oracle-actions/login-ocir@v1.3.0
        with:
          auth_token: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build image
        run: |
          docker build --platform linux/amd64 \
            -f appdeploy/Dockerfile \
            -t ${{ env.IMAGE_REPO }}:cuopt-interactive-frontend-${{ env.SHORT_SHA }} .

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_REPO }}:cuopt-interactive-frontend-${{ env.SHORT_SHA }}

  # ── Build & push image (merge to main) ───────────────────────────
  build-and-push-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-frontend, lint-backend, test-backend, security-scan]
    env:
      IMAGE_REPO: iad.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/corrino-devops-repository
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to OCIR
        uses: oracle-actions/login-ocir@v1.3.0
        with:
          auth_token: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build image
        run: |
          docker build --platform linux/amd64 \
            -f appdeploy/Dockerfile \
            -t ${{ env.IMAGE_REPO }}:cuopt-interactive-frontend-${{ env.SHORT_SHA }} .

      - name: Push SHA-tagged image
        run: |
          docker push ${{ env.IMAGE_REPO }}:cuopt-interactive-frontend-${{ env.SHORT_SHA }}

      - name: Tag and push latest
        run: |
          docker tag \
            ${{ env.IMAGE_REPO }}:cuopt-interactive-frontend-${{ env.SHORT_SHA }} \
            ${{ env.IMAGE_REPO }}:cuopt-interactive-frontend-latest
          docker push ${{ env.IMAGE_REPO }}:cuopt-interactive-frontend-latest
