# ============================================================================
# CuOPT Frontend - Basic Authentication Secret
# ============================================================================
# This secret contains the htpasswd format credentials for basic auth
#
# To generate a new password hash:
#   htpasswd -nb admin admin123
#   OR
#   echo -n 'admin:' && openssl passwd -apr1 admin123
#
# Default credentials:
#   Username: admin
#   Password: admin123
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cuopt-basic-auth
  namespace: cuopt
  labels:
    app.kubernetes.io/name: cuopt-frontend
    app.kubernetes.io/component: frontend
type: Opaque
stringData:
  # Format: username:apr1-hashed-password
  # This is admin:admin123 in htpasswd apr1 format
  auth: |
    admin:$apr1$tYqmXHCq$NIV17rEeXNOm2mFV4asp70
---
# ============================================================================
# Alternative: Create secret using kubectl command
# ============================================================================
# Run this command to create the secret manually:
#
# # Generate htpasswd file
# htpasswd -cb /tmp/auth admin admin123
#
# # Create secret from file
# kubectl create secret generic cuopt-basic-auth \
#   --namespace=cuopt \
#   --from-file=auth=/tmp/auth
#
# # Or using openssl:
# HASH=$(openssl passwd -apr1 admin123)
# echo "admin:$HASH" > /tmp/auth
# kubectl create secret generic cuopt-basic-auth \
#   --namespace=cuopt \
#   --from-file=auth=/tmp/auth
# ============================================================================
