# ============================================================================
# CuOPT Frontend - Secrets
# Sensitive configuration values (base64 encoded)
# ============================================================================
# NOTE: Replace placeholder values with actual base64-encoded values
# To encode: echo -n 'your-value' | base64
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cuopt-frontend-secrets
  namespace: cuopt
  labels:
    app.kubernetes.io/name: cuopt-frontend
    app.kubernetes.io/component: frontend
type: Opaque
data:
  # OCI Compartment ID (base64 encoded)
  # echo -n 'ocid1.compartment.oc1..xxxxx' | base64
  OCI_COMPARTMENT_ID: "REPLACE_WITH_BASE64_ENCODED_COMPARTMENT_ID"

  # OCI GenAI Model ID (base64 encoded)
  # echo -n 'ocid1.generativeaimodel.oc1.phx.xxxxx' | base64
  OCI_GENAI_MODEL_ID: "REPLACE_WITH_BASE64_ENCODED_MODEL_ID"

  # OpenWeatherMap API Key (optional, base64 encoded)
  # echo -n 'your-api-key' | base64
  OPENWEATHERMAP_API_KEY: ""

---
# ============================================================================
# OCI API Keys Secret (for OCI SDK authentication)
# Mount as volume to /root/.oci
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: oci-api-keys
  namespace: cuopt
  labels:
    app.kubernetes.io/name: cuopt-frontend
    app.kubernetes.io/component: frontend
type: Opaque
data:
  # OCI Config file (base64 encoded)
  # cat ~/.oci/config | base64 -w 0
  config: "REPLACE_WITH_BASE64_ENCODED_OCI_CONFIG"

  # OCI Private Key (base64 encoded)
  # cat ~/.oci/oci_api_key.pem | base64 -w 0
  oci_api_key.pem: "REPLACE_WITH_BASE64_ENCODED_PRIVATE_KEY"
