# ============================================================================
# CuOPT Frontend - Kubernetes Deployment
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cuopt-frontend
  namespace: cuopt
  labels:
    app.kubernetes.io/name: cuopt-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cuopt-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cuopt-frontend
        app.kubernetes.io/component: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/health"
    spec:
      containers:
        - name: cuopt-frontend
          # Update with your OCI Container Registry path
          image: ${OCI_REGION}.ocir.io/${OCI_TENANCY_NAMESPACE}/cuopt-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: api
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cuopt-frontend-config
          env:
            - name: OCI_COMPARTMENT_ID
              valueFrom:
                secretKeyRef:
                  name: cuopt-frontend-secrets
                  key: OCI_COMPARTMENT_ID
            - name: OCI_GENAI_MODEL_ID
              valueFrom:
                secretKeyRef:
                  name: cuopt-frontend-secrets
                  key: OCI_GENAI_MODEL_ID
            - name: OPENWEATHERMAP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cuopt-frontend-secrets
                  key: OPENWEATHERMAP_API_KEY
                  optional: true
          volumeMounts:
            - name: oci-config
              mountPath: /root/.oci
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            readOnlyRootFilesystem: false
            runAsNonRoot: false
      volumes:
        - name: oci-config
          secret:
            secretName: oci-api-keys
            defaultMode: 0400
      imagePullSecrets:
        - name: ocir-secret
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
